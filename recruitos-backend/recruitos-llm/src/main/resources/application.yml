server:
  port: 8095

spring:
  application:
    name: recruitos-llm

recruitos:
  llm:
    enabled: true
    # 小米 MiMo（OpenAI 兼容）；也支持 OPENAI_* 环境变量
    provider: mimo
    provider-base-url: ${MIMO_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
    api-key: ${MIMO_API_KEY:${OPENAI_API_KEY:}}
    auth-mode: ${MIMO_AUTH_MODE:api-key}
    model: ${MIMO_MODEL:mimo-v2.5}
    max-completion-tokens: 2048
    temperature: 0.2

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.recruitos: info
