server:
  port: 8091

spring:
  application:
    name: recruitos-agent
  datasource:
    url: jdbc:mysql://localhost:3306/recruit_os?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus configuration
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Sa-Token configuration
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 7200
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

# Knife4j configuration
knife4j:
  enable: true
  openapi:
    title: RecruitOS Agent API
    description: Agent management API documentation
    version: 1.0.0
    group:
      default:
        group-name: Agent
        api-rule: package
        api-rule-resources:
          - com.recruitos.agent.controller

recruitos:
  evolution:
    base-url: http://localhost:8090
    enabled: true
    timeout-ms: 3000
  llm:
    base-url: http://localhost:8095
    enabled: true
    timeout-ms: 30000
  agent:
    rpa:
      # 寻源编排开关：true 时 Campaign 可运行（默认走模拟，不连真实平台）
      enabled: true
      # 平台实况访问：测试阶段务必 false，禁止连接 Boss/猎聘；手动联调时再改 true
      platform-access-enabled: false
      headless: false
      fallback-simulated: false
      session-dir: ./data/rpa-sessions
      login-timeout-seconds: 300
      action-timeout-ms: 45000
      slow-mo-ms: 80

logging:
  level:
    com.recruitos: debug
